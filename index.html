<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かみしばい</title>
  <style>
    /* ===== 字幕テキストはここを編集してください ===== */

    /* ===== デザイン設定 ===== */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans JP', 'Hiragino Maru Gothic Pro', 'rounded-mplus-1c', sans-serif;
      padding: 20px;
      overflow-x: hidden;
    }

    h1 {
      font-size: clamp(2.6rem, 7vw, 4.2rem);
      font-weight: 900;
      color: #111;
      margin-bottom: 20px;
      letter-spacing: 4px;
      text-align: center;
      line-height: 1.4;
    }

    h1 small {
      display: block;
      font-size: clamp(1.1rem, 3.5vw, 1.6rem);
      font-weight: 700;
      letter-spacing: 2px;
      color: #333;
      margin-top: 4px;
    }

    .stage {
      background: white;
      padding: 20px;
      max-width: 800px;
      width: 100%;
      position: relative;
    }

    /* ページカウンター */
    .page-counter {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 12px;
    }

    .page-counter span {
      padding: 4px 16px;
    }

    /* 画像エリア */
    .image-container {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #f5f5f5;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.4s ease;
    }

    .image-container img.fade {
      opacity: 0;
    }

    /* 字幕エリア */
    .subtitle-box {
      background: #f5f5f5;
      border-radius: 8px;
      margin-top: 16px;
      padding: 16px 22px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .subtitle-text {
      color: #111;
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 700;
      line-height: 1.7;
      text-align: left;
      letter-spacing: 1px;
      white-space: pre-wrap;
      word-break: auto-phrase;
      overflow-wrap: break-word;
      line-break: strict;
    }

    /* ボタンエリア */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 22px;
    }

    .btn {
      border: 2px solid #333;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      background: white;
      color: #111;
      transition: background 0.1s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover {
      background: #f0f0f0;
    }

    .btn:active {
      background: #e0e0e0;
    }

    .btn-nav {
      font-size: clamp(1rem, 3vw, 1.3rem);
      padding: 14px 36px;
      letter-spacing: 2px;
    }

    .btn-nav:disabled {
      border-color: #ccc;
      color: #aaa;
      cursor: not-allowed;
      background: white;
    }

    /* 音声コントロール */
    .audio-control {
      font-size: 1.6rem;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    /* ページドット */
    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 18px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .dot.active {
      background: #333;
      transform: scale(1.4);
    }

    /* 読み込み中 */
    .loading {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      font-size: 3rem;
      display: none;
    }

    /* クレジットページ */
    .credits-box {
      margin-top: 16px;
      padding: 32px 28px;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .credits-text {
      max-width: 600px;
      text-align: center;
      color: #111;
      line-height: 1.9;
    }

    .credits-heading {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: 4px;
    }

    .credits-text p {
      font-size: 1rem;
      margin-bottom: 8px;
    }

    .credits-list {
      margin-top: 28px;
      border-top: 1px solid #ccc;
      padding-top: 20px;
      text-align: left;
      display: inline-block;
    }

    .credits-list p {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    /* クイズページ */
    .quiz-box {
      margin-top: 16px;
      padding: 28px 24px;
    }

    .quiz-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .quiz-title {
      font-size: 1.3rem;
      font-weight: 900;
      color: #111;
      letter-spacing: 3px;
      margin-bottom: 6px;
    }

    .quiz-progress {
      font-size: 1rem;
      color: #555;
      font-weight: 700;
    }

    .quiz-question {
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 700;
      color: #111;
      line-height: 1.7;
      margin-bottom: 10px;
    }

    .quiz-hint {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 22px;
    }

    .hint-link {
      background: none;
      border: none;
      border-bottom: 1px solid #888;
      color: #555;
      font-family: inherit;
      font-size: inherit;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      text-decoration: none;
    }

    .hint-link:hover {
      color: #111;
      border-bottom-color: #111;
    }

    .quiz-choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 22px;
    }

    .choice-btn {
      border: 2px solid #333;
      border-radius: 8px;
      background: white;
      color: #111;
      font-family: inherit;
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      font-weight: 700;
      padding: 14px 20px;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s;
      line-height: 1.5;
    }

    .choice-btn:hover:not(:disabled) {
      background: #f0f0f0;
    }

    .choice-btn.correct {
      background: #e8f5e9;
      border-color: #388e3c;
      color: #1b5e20;
    }

    .choice-btn.wrong {
      background: #fce4ec;
      border-color: #c62828;
      color: #b71c1c;
    }

    .choice-btn.dimmed {
      opacity: 0.4;
      cursor: default;
    }

    .quiz-result {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 18px 20px;
      margin-top: 4px;
    }

    .quiz-result-label {
      font-size: 1.3rem;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .quiz-result-label.ok  { color: #2e7d32; }
    .quiz-result-label.ng  { color: #c62828; }

    .quiz-explanation {
      font-size: 0.98rem;
      line-height: 1.75;
      color: #222;
      margin-bottom: 18px;
      word-break: auto-phrase;
      line-break: strict;
    }

    .quiz-next-btn {
      display: block;
      margin: 0 auto;
      font-size: 1rem;
      padding: 12px 32px;
      letter-spacing: 1px;
    }

    .quiz-finish {
      text-align: center;
      padding: 20px 0 8px;
    }

    .quiz-finish-msg {
      font-size: 1.2rem;
      font-weight: 900;
      color: #111;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    /* レスポンシブ */
    @media (max-width: 500px) {
      .btn-nav { padding: 14px 24px; }
      .audio-control { width: 52px; height: 52px; font-size: 1.4rem; }
      .stage { padding: 14px; }
    }
  </style>
</head>
<body>

  <h1>てしゃまんく<br><small>静岡市北部・井川に伝わるお話</small></h1>

  <div class="stage">
    <div class="page-counter">
      <span id="pageLabel">1 / 10</span>
    </div>

    <div class="image-container" id="imageContainer">
      <img id="mainImage" src="images/01.jpg" alt="かみしばい">
      <div class="loading" id="loading">⏳</div>
    </div>

    <div class="subtitle-box" id="subtitleBox">
      <div class="subtitle-text" id="subtitleText"></div>
    </div>

    <div class="quiz-box" id="quizBox" style="display:none;">
      <div class="quiz-header">
        <div class="quiz-title">井川方言クイズ</div>
        <div class="quiz-progress" id="quizProgress">Q1 / 5</div>
      </div>
      <div id="quizInner">
        <!-- JSで生成 -->
      </div>
    </div>

    <div class="credits-box" id="creditsBox" style="display:none;">
      <div class="credits-text">
        <p class="credits-heading">ー謝辞ー</p>
        <p>この紙芝居は、日本言語学会「言語の多様性に関する啓蒙・教育プロジェクト助成」・「ユニベール財団研究助成」を受けています。<br>
        井川の民話・井川の方言を教えてくださった地域の皆様に深謝いたします。</p>
        <div class="credits-list">
          <p>絵：齊藤暢子</p>
          <p>再話：谷口ジョイ</p>
          <p>井川方言指導：遠藤弘子先生＋井川の皆様</p>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-nav" id="prevBtn" onclick="changePage(-1)">◀ まえへ</button>
      <button class="btn audio-control" id="replayBtn" onclick="replayAudio()" title="もう一度きく">🔊</button>
      <button class="btn btn-nav" id="nextBtn" onclick="changePage(1)">つぎへ ▶</button>
    </div>

    <div class="dots" id="dots"></div>
  </div>

  <audio id="audioPlayer" preload="auto"></audio>

  <script>
    // ============================================================
    //  字幕テキスト — ここを編集してください
    //  各ページに対応する文字列を書いてください
    // ============================================================
    const subtitles = [
      /* 01 */ "てしゃまんく\nこんな話が、あったってなあ。",
      /* 02 */ "井川（いかわ）は、静岡のずっとずうっと奥にある、南アルプスを背にした美しい山里です。\n昔、てしゃまんくは、この井川で生まれました。",
      /* 03 */ "てしゃまんくは、赤ちゃんの頃から力持ち。\n山の動物たちは、「こんなにつえぇあかんごがいるだか！」とびっくり。\n5歳になったてしゃまんくは、毎日、山の中を走り回っています。\n山犬が「こっちぃ来そ！」と叫んでも、てしゃまんくは、追いかけ回しています。",
      /* 04 */ "ある時、てしゃまんくは「もやっぴろいでも 行ってござあ」と、山へ行きました。\n「いけぇ木だ。よし、こうすりゃあ枝がぺしょーれて落ちてくるぞ。よーか？ぷるうぞ！」\nてしゃまんくが、大きな木にドーンと体当たりすると、枝がバランバランと落ちてきました。",
      /* 05 */ "あれえ？どこからか、泣き声が聞こえます。\n見ると、木の根元で、ウリンボウがえーんえんと泣いていました。\n「どうしただ？」\n「あっこの崖（がけ）からつっとんだ」\n「そりゃ、てえへんだ。おかあもしんぺえして、さがしまあってるらで、おれがおかあのところに連れてってやるで。でえじょうぶだ」\n「おっかね、こえぇっけ。あんにいちゃん。ありがとさん」",
      /* 06 */ "てしゃまんくは、井川で一番高い山に登り、お母さんイノシシを呼びました。\n「おーい、ウリンボウのおかあ！あかんごをむかえに来てくりょう！」\nイノシシのお母さんは、すぐに山まで迎えに来ました。\n「おっかね、うれしっけ。てしゃまんくさん、ありがとさん！さ、いそぇーでえぃーへぱしらざあ！みんな、しんぺぇして待ってるでなあ」\nお母さんは喜んで、ウリンボウと山へ帰って行きました。\nてしゃまんくは、親子に手を振りました。\n「元気でなー」",
      /* 07 */ "てしゃまんくは、力持ちで、優しい大人に成長しました。\nある時、村の人たちが、落ちた橋の前で、すっかり困っていました。\n「こりゃ、まじいっけな。ゆんべの大雨で大井川にかかった橋が落ちてしまった。向こうへ行きてぇが、行けのうで困ったなあ。どうしるか」\nそれを見たてしゃまんく、えい！やあ！と橋を持ち上げて、簡単に直してしまいました",
      /* 08 */ "足も速い速いてしゃまんく。\n駿府の町まで、村の人なら2日もかかるところを、てしゃまんくは、その日のうちに行って、戻ってくることができました。\n「今日は天気も上々だ。たくさん売ったり買ったりして来（こ）にゃならねえ」\nてしゃまんくは、こんなふうにたくさんの荷物を運んで、村の人の生活を支えていました。\n「あんなにたくさんの荷物をしょって！てえしたもんだなあ」\n「うらなら、とてもじゃねえが、ふた晩どまりだ」\n村の人は口々に言いました。",
      /* 09 */ "ある時、てしゃまんくが、駿府（すんぷ）の町に行った時のことです。\n浅間（せんげん）神社で、大勢の人が、石の鳥居を建てていました。\nところが、石は重くて、びくともしません。\n「おれにやらせてみてくりょぉ。この荷棒（にんぼう）と細びきを使って、あんばいよく、ぼっ建てるでな」\nてしゃまんくは、背負子（しょいこ）を下ろしもしないで、一人で石鳥居をひょいと持ち上げてしまいました。",
      /* 10 */ "見ていた人々は拍手喝采。\n「てえしたもんだ！」\n「ちいっとかたんがってるみてえだが、あとは、直してくりょぉよ」\nこんなふうに、心の優しいてしゃまんくは、あちこちで困っている人を助けて、授かった力と知恵を、たくさんの人のために惜しみなく使ったとさ\n500年以上も前のお話。\nおしめえ。",
    ];
    // ============================================================

    // ============================================================
    //  クイズデータ
    // ============================================================
    const quizData = [
      {
        q: "「来そ」とは、どのような意味でしょうか。",
        hintPage: 3,
        choices: ["来るな", "来よう", "来た"],
        answer: 0,
        explanation: "「来そ」とは「来るな」という意味です。「〜そ」は禁止を表します。「食べるな」は「食っそ」、「行くな」は「行っそ」になります。"
      },
      {
        q: "「もや」とは、どのような意味でしょうか。",
        hintPage: 4,
        choices: ["薪（たきぎ）", "霧（きり）", "絵（え）"],
        answer: 0,
        explanation: "「もや」は、井川方言で「細い薪（まき）」や「薪（たきぎ）」のことです。「そだ」とも言います。"
      },
      {
        q: "「おっかね」とは、どのような意味でしょうか。",
        hintPage: 5,
        choices: ["お金がない", "あらまあ", "おっかない"],
        answer: 1,
        explanation: "「おっかね」や「おっかな」は、井川方言で「あらまあ」を意味します。驚いた時などに使います。"
      },
      {
        q: "「ぱしらざぁ」とは、どのような意味でしょうか。",
        hintPage: 6,
        choices: ["走らない", "パシリだ", "帰ろう"],
        answer: 2,
        explanation: "「ぱしる」は、井川方言で「行く」や「帰る」を意味します。「〜ざぁ」は「〜ましょう」という意味です。"
      },
      {
        q: "「うら」とは、どのような意味でしょうか。",
        hintPage: 8,
        choices: ["私たち", "あなたたち", "あの人たち"],
        answer: 0,
        explanation: "「うら」は、井川方言で「私」や「私たち」を意味します。男性、女性に関わらず、「おれ」とも言います。"
      }
    ];

    let quizIndex = 0;
    let prevPage  = 0;

    function showQuestion() {
      const inner    = document.getElementById('quizInner');
      const progress = document.getElementById('quizProgress');

      if (quizIndex >= quizData.length) {
        progress.textContent = '全問終了！';
        inner.innerHTML = `
          <div class="quiz-finish">
            <button class="btn btn-nav quiz-next-btn" onclick="goToPage(${CREDITS_PAGE})">クレジットへ ▶</button>
          </div>`;
        return;
      }

      const q = quizData[quizIndex];
      progress.textContent = `Q${quizIndex + 1} / ${quizData.length}`;

      const choicesHtml = q.choices.map((c, i) =>
        `<button class="choice-btn" onclick="answerQuiz(${i})">(${i + 1}) ${c}</button>`
      ).join('');

      inner.innerHTML = `
        <div class="quiz-question">${q.q}</div>
        <div class="quiz-hint">💡 ヒント：紙芝居の<button class="hint-link" onclick="goToPage(${q.hintPage})">${q.hintPage}枚目</button>を見てね。</div>
        <div class="quiz-choices" id="quizChoices">${choicesHtml}</div>
        <div class="quiz-result" id="quizResult" style="display:none;">
          <div class="quiz-result-label" id="quizResultLabel"></div>
          <div class="quiz-explanation" id="quizExplanation"></div>
          <button class="btn btn-nav quiz-next-btn" onclick="nextQuestion()">
            ${quizIndex + 1 < quizData.length ? 'つぎの問題へ ▶' : '結果を見る ▶'}
          </button>
        </div>`;
    }

    function answerQuiz(selected) {
      const q = quizData[quizIndex];
      const btns = document.querySelectorAll('.choice-btn');
      btns.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.answer) {
          btn.classList.add('correct');
        } else if (i === selected && selected !== q.answer) {
          btn.classList.add('wrong');
        } else {
          btn.classList.add('dimmed');
        }
      });

      const isCorrect = selected === q.answer;
      const resultEl = document.getElementById('quizResult');
      const labelEl  = document.getElementById('quizResultLabel');
      const expEl    = document.getElementById('quizExplanation');

      labelEl.textContent = isCorrect ? '⭕ 正解！' : '❌ 不正解';
      labelEl.className   = 'quiz-result-label ' + (isCorrect ? 'ok' : 'ng');
      expEl.textContent   = q.explanation;
      resultEl.style.display = 'block';
    }

    function nextQuestion() {
      quizIndex++;
      showQuestion();
    }

    // ============================================================

    const TOTAL        = 10;
    const QUIZ_PAGE    = 11;
    const CREDITS_PAGE = 12;
    let currentPage = 1;

    const mainImage      = document.getElementById('mainImage');
    const imageContainer = document.getElementById('imageContainer');
    const subtitleEl     = document.getElementById('subtitleText');
    const subtitleBox    = document.getElementById('subtitleBox');
    const quizBox        = document.getElementById('quizBox');
    const creditsBox     = document.getElementById('creditsBox');
    const pageLabel      = document.getElementById('pageLabel');
    const prevBtn        = document.getElementById('prevBtn');
    const nextBtn        = document.getElementById('nextBtn');
    const replayBtn      = document.getElementById('replayBtn');
    const audioPlayer    = document.getElementById('audioPlayer');
    const dotsEl         = document.getElementById('dots');

    // ドット生成（本編10ページ分）
    for (let i = 1; i <= TOTAL; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 1 ? ' active' : '');
      d.dataset.page = i;
      d.onclick = () => goToPage(i);
      dotsEl.appendChild(d);
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateDots() {
      document.querySelectorAll('.dot').forEach(d => {
        d.classList.toggle('active', parseInt(d.dataset.page) === currentPage);
      });
    }

    function goToPage(page) {
      if (page < 1 || page > CREDITS_PAGE) return;
      currentPage = page;

      const isQuiz    = currentPage === QUIZ_PAGE;
      const isCredits = currentPage === CREDITS_PAGE;
      const isStory   = !isQuiz && !isCredits;

      // 表示切り替え
      imageContainer.style.display = isStory  ? ''     : 'none';
      subtitleBox.style.display    = isStory  ? ''     : 'none';
      quizBox.style.display        = isQuiz   ? ''     : 'none';
      creditsBox.style.display     = isCredits ? 'flex' : 'none';
      replayBtn.style.display      = isStory  ? ''     : 'none';

      if (isStory) {
        mainImage.classList.add('fade');
        setTimeout(() => {
          mainImage.src = `images/${pad(currentPage)}.jpg`;
          mainImage.classList.remove('fade');
        }, 300);
        subtitleEl.textContent = subtitles[currentPage - 1] || '';
        playAudio();
      } else {
        audioPlayer.pause();
      }

      // クイズ：ページ10から来た場合のみリセット、ヒントから戻った場合は状態を保持
      if (isQuiz) {
        if (prevPage === TOTAL) quizIndex = 0;
        showQuestion();
      }

      // ページ表示
      pageLabel.textContent = isStory ? `${currentPage} / ${TOTAL}` : '';

      // 「クイズにもどる」ボタン（ヒントで飛んだ先のページに表示）
      let returnBtn = document.getElementById('returnToQuizBtn');
      if (isStory && prevPage === QUIZ_PAGE) {
        if (!returnBtn) {
          returnBtn = document.createElement('button');
          returnBtn.id = 'returnToQuizBtn';
          returnBtn.className = 'btn btn-nav';
          returnBtn.style.marginTop = '12px';
          returnBtn.style.width = '100%';
          returnBtn.textContent = '▲ クイズにもどる';
          returnBtn.onclick = () => goToPage(QUIZ_PAGE);
          document.querySelector('.controls').after(returnBtn);
        }
        returnBtn.style.display = '';
      } else {
        if (returnBtn) returnBtn.style.display = 'none';
      }

      // ボタン
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === QUIZ_PAGE || currentPage === CREDITS_PAGE;

      // ドット
      updateDots();

      prevPage = currentPage;
    }

    function playAudio() {
      audioPlayer.pause();
      audioPlayer.src = `audio/${pad(currentPage)}.mp3`;
      audioPlayer.load();
      const playPromise = audioPlayer.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {});
      }
    }

    function replayAudio() {
      audioPlayer.currentTime = 0;
      audioPlayer.play().catch(() => {});
    }

    function changePage(dir) {
      goToPage(currentPage + dir);
    }

    // キーボード操作
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changePage(-1);
      if (e.key === ' ') { e.preventDefault(); replayAudio(); }
    });

    // 初期化
    goToPage(1);
  </script>

</body>
</html>
